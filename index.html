<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星座占いまとめ | 複数サイトを一括チェック</title>
    <meta name="description" content="複数の占いサイトの今日の星座運勢を一括確認。気になる星座を選ぶだけ。">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="stars-bg" aria-hidden="true">
        <div class="stars s1"></div>
        <div class="stars s2"></div>
        <div class="stars s3"></div>
    </div>

    <header class="site-header">
        <div class="header-inner">
            <h1 class="site-title">✨ 星座占いまとめ ✨</h1>
            <p class="site-subtitle">複数の占いサイトの運勢を一括チェック</p>
            <p id="today-date" class="today-date"></p>
        </div>
    </header>

    <main class="main-content">
        <!-- 星座選択 -->
        <section class="sign-section">
            <h2 class="section-title">星座を選んでください</h2>
            <div id="sign-grid" class="sign-grid"></div>
        </section>

        <!-- 結果エリア -->
        <section id="results-section" class="results-section" hidden>
            <div id="selected-header" class="selected-header">
                <span id="selected-symbol" class="selected-symbol"></span>
                <div class="selected-info">
                    <h2 id="selected-name" class="selected-name"></h2>
                    <p id="selected-period" class="selected-period"></p>
                </div>
            </div>

            <p id="status-msg" class="status-msg" hidden></p>

            <div id="loading" class="loading-wrap" hidden>
                <div class="spinner"></div>
                <p>占い結果を取得中です...</p>
            </div>

            <div id="results-grid" class="results-grid"></div>
        </section>
    </main>

    <footer class="site-footer">
        <p>※ 占いはエンターテインメントです。参考程度にお楽しみください。</p>
        <p>※ 「サンプル」と表示されるソースはデモデータです。実際の占いとは異なります。</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
